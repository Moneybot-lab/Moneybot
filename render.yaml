services:
  - type: web
    name: moneybot
    env: python
    buildCommand: bash scripts/render_build.sh
    startCommand: |
      if [ -d migrations ]; then
        flask --app app:app db upgrade || echo "Migration step failed; starting web server anyway."
      else
        echo "No migrations directory found; skipping database migration step."
      fi
      python app.py
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.11
      - key: MONEYBOT_SECRET_KEY
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: DATA_PROVIDER
        value: yfinance
