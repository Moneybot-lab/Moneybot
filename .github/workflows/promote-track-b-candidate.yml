name: Promote Track B Candidate

on:
  workflow_dispatch:
    inputs:
      track_b_run_id:
        description: "Run ID from the successful gated Massive Track B Offline Challenger workflow"
        required: true
        type: string
      force:
        description: "Force promotion even when candidate_win is false (normally leave false)"
        required: true
        default: false
        type: boolean

permissions:
  actions: read
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  promote-track-b:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Download Track B artifact
        uses: actions/download-artifact@v4
        with:
          name: track-b-offline-output
          path: track-b-artifact
          run-id: ${{ inputs.track_b_run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve Track B promotion artifact paths
        run: |
          set -euo pipefail
          echo "Downloaded artifact files:"
          find track-b-artifact -maxdepth 6 -type f | sort
          comparison_path="$(find track-b-artifact -type f -path "*/data/track_b/model_comparison_track_b.json" -o -name model_comparison_track_b.json | head -n 1)"
          candidate_path="$(find track-b-artifact -type f -path "*/data/track_b/candidate_model_track_b.json" -o -name candidate_model_track_b.json | head -n 1)"
          test -n "$comparison_path" || (echo "Missing model_comparison_track_b.json in downloaded artifact" && exit 1)
          test -n "$candidate_path" || (echo "Missing candidate_model_track_b.json in downloaded artifact" && exit 1)
          test -s "$comparison_path"
          test -s "$candidate_path"
          echo "COMPARISON_REPORT_PATH=$comparison_path" >> "$GITHUB_ENV"
          echo "CANDIDATE_MODEL_PATH=$candidate_path" >> "$GITHUB_ENV"

      - name: Validate Track B promotion artifacts
        run: |
          set -euo pipefail
          test -s track-b-artifact/track_b/model_comparison_track_b.json
          test -s track-b-artifact/track_b/candidate_model_track_b.json
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path
          report = json.loads(Path("track-b-artifact/track_b/model_comparison_track_b.json").read_text())
          print(json.dumps({
              "candidate_win": report.get("candidate_win"),
              "reasons": report.get("reasons"),
              "candidate_metrics": report.get("candidate_metrics"),
              "production_metrics": report.get("production_metrics"),
          }, indent=2, sort_keys=True))
          if not report.get("candidate_win"):
              raise SystemExit("No gated challenger is ready for Render promotion; do not force unless explicitly approved after reviewing backtest_report.json.")
          gates = report.get("promotion_gates") or {}
          if gates and not gates.get("promotion_ready", False):
              raise SystemExit("Selected challenger does not have promotion_ready=true in promotion_gates.")
          PY
        if: ${{ !inputs.force }}

      - name: Validate Track B promotion artifacts for forced run
        run: |
          set -euo pipefail
          test -s track-b-artifact/track_b/model_comparison_track_b.json
          test -s track-b-artifact/track_b/candidate_model_track_b.json
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path
          report = json.loads(Path("track-b-artifact/track_b/model_comparison_track_b.json").read_text())
          print(json.dumps({
              "candidate_win": report.get("candidate_win"),
              "reasons": report.get("reasons"),
              "candidate_metrics": report.get("candidate_metrics"),
              "production_metrics": report.get("production_metrics"),
              "forced": True,
          }, indent=2, sort_keys=True))
          PY
        if: ${{ inputs.force }}

      - name: Promote candidate on Render
        env:
          MONEYBOT_BASE_URL: ${{ secrets.MONEYBOT_BASE_URL }}
          TRACK_B_PROMOTION_TOKEN: ${{ secrets.TRACK_B_PROMOTION_TOKEN }}
          FORCE_PROMOTION: ${{ inputs.force }}
        run: |
          set -euo pipefail
          test -n "$MONEYBOT_BASE_URL" || (echo "Missing secret: MONEYBOT_BASE_URL" && exit 1)
          test -n "$TRACK_B_PROMOTION_TOKEN" || (echo "Missing secret: TRACK_B_PROMOTION_TOKEN" && exit 1)
          force_form="false"
          if [ "$FORCE_PROMOTION" = "true" ]; then
            force_form="true"
          fi
          curl -fsS --retry 3 --retry-delay 3 --retry-all-errors \
            -X POST "$MONEYBOT_BASE_URL/api/promote-track-b-candidate" \
            -H "X-Track-B-Promotion-Token: $TRACK_B_PROMOTION_TOKEN" \
            -F "comparison_report=@track-b-artifact/track_b/model_comparison_track_b.json;type=application/json" \
            -F "candidate_model=@track-b-artifact/track_b/candidate_model_track_b.json;type=application/json" \
            -F "force=$force_form"
