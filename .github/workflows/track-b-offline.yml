name: Track B Offline Challenger

on:
  schedule:
    - cron: "15 6 * * *"
  workflow_dispatch:
    inputs:
      massive_prefix:
        description: "Massive flat-files prefix to ingest"
        required: true
        default: "us_stocks_sip/day_aggs_v1"
        type: string
      dataset_date:
        description: "Immutable ingest date folder (YYYY-MM-DD); leave blank for current UTC date"
        required: false
        default: ""
        type: string
      min_rows:
        description: "Minimum rows required for challenger training/backtest gates"
        required: true
        default: "200"
        type: string

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  PYTHONPATH: ${{ github.workspace }}
  MASSIVE_FLATFILES_PREFIX: ${{ inputs.massive_prefix || 'us_stocks_sip/day_aggs_v1' }}
  MASSIVE_INGEST_DATE: ${{ inputs.dataset_date || '' }}
  TRACK_B_MIN_ROWS: ${{ inputs.min_rows || '200' }}

jobs:
  run-track-b:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt awscli
          aws --version

      - name: Validate Massive flat-file secrets
        env:
          MASSIVE_FLATFILES_ACCESS_KEY_ID: ${{ secrets.MASSIVE_FLATFILES_ACCESS_KEY_ID }}
          MASSIVE_FLATFILES_SECRET_ACCESS_KEY: ${{ secrets.MASSIVE_FLATFILES_SECRET_ACCESS_KEY }}
          MASSIVE_FLATFILES_ENDPOINT: ${{ secrets.MASSIVE_FLATFILES_ENDPOINT }}
          MASSIVE_FLATFILES_BUCKET: ${{ secrets.MASSIVE_FLATFILES_BUCKET }}
        run: python3 scripts/check_massive_flatfiles_env.py --prefix "$MASSIVE_FLATFILES_PREFIX"

      - name: Fetch real decision log export
        env:
          MONEYBOT_BASE_URL: ${{ secrets.MONEYBOT_BASE_URL }}
          DAILY_OPS_TOKEN: ${{ secrets.DAILY_OPS_TOKEN }}
        run: |
          set -euo pipefail
          test -n "$MONEYBOT_BASE_URL" || (echo "Missing secret: MONEYBOT_BASE_URL" && exit 1)
          test -n "$DAILY_OPS_TOKEN" || (echo "Missing secret: DAILY_OPS_TOKEN" && exit 1)
          mkdir -p data data/track_b

          curl -fsS --retry 3 --retry-delay 3 --retry-all-errors \
            "$MONEYBOT_BASE_URL/api/export-decision-log?limit=50000" \
            -H "X-Daily-Ops-Token: $DAILY_OPS_TOKEN" \
            -o data/decision_events.jsonl

          test -s data/decision_events.jsonl || (echo "Exported decision log is empty" && exit 1)
          wc -l data/decision_events.jsonl

      - name: Ingest Massive flat files into immutable dated folder
        env:
          MASSIVE_FLATFILES_ACCESS_KEY_ID: ${{ secrets.MASSIVE_FLATFILES_ACCESS_KEY_ID }}
          MASSIVE_FLATFILES_SECRET_ACCESS_KEY: ${{ secrets.MASSIVE_FLATFILES_SECRET_ACCESS_KEY }}
          MASSIVE_FLATFILES_ENDPOINT: ${{ secrets.MASSIVE_FLATFILES_ENDPOINT }}
          MASSIVE_FLATFILES_BUCKET: ${{ secrets.MASSIVE_FLATFILES_BUCKET }}
        run: |
          set -euo pipefail
          args=(--prefix "$MASSIVE_FLATFILES_PREFIX" --destination-root data/raw/massive_flatfiles)
          if [ -n "$MASSIVE_INGEST_DATE" ]; then
            args+=(--dataset-date "$MASSIVE_INGEST_DATE")
          fi
          python3 scripts/ingest_massive_flatfiles.py "${args[@]}"

      - name: Build leakage-safe Massive decision training rows
        run: |
          python3 scripts/build_massive_decision_training_rows.py \
            --raw-root data/raw/massive_flatfiles \
            --decision-log data/decision_events.jsonl \
            --output data/track_b/decision_training_snapshot_massive.jsonl \
            --limit 50000 \
            --horizon-days 5

      - name: Materialize reproducible flat feature store
        run: |
          python3 scripts/day15_materialize_flat_feature_store.py \
            --input data/track_b/decision_training_snapshot_massive.jsonl \
            --output-dir data/track_b/flat_feature_store \
            --train-ratio 0.8

      - name: Train offline challenger suite
        run: |
          python3 scripts/train_challenger_suite.py \
            --input data/track_b/flat_feature_store/train.jsonl \
            --output-dir data/track_b/challenger_suite \
            --min-rows "$TRACK_B_MIN_ROWS"

      - name: Backtest and gate challenger suite
        run: |
          python3 scripts/backtest_challenger_suite.py \
            --suite-manifest data/track_b/challenger_suite/challenger_suite_manifest.json \
            --feature-store data/track_b/flat_feature_store/test.jsonl \
            --output data/track_b/challenger_suite/backtest_report.json \
            --min-rows "$TRACK_B_MIN_ROWS" \
            --transaction-cost-bps 5 \
            --slippage-bps 5

      - name: Prepare manual Render promotion artifacts
        run: |
          python3 scripts/prepare_challenger_promotion.py \
            --backtest-report data/track_b/challenger_suite/backtest_report.json \
            --output-dir data/track_b

      - name: Upload Track B artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: track-b-offline-output
          path: |
            data/track_b/**
            data/decision_events.jsonl
            data/raw/**/_INGEST_MANIFEST.json
          if-no-files-found: warn
