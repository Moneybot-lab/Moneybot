name: Track B Offline Challenger

on:
  schedule:
    - cron: "15 6 * * *"
  workflow_dispatch: {}

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  run-track-b:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Dry run
        run: python3 scripts/run_track_b_offline.py --dry-run

      # Ensure output dir exists so artifact step has something even on early failure
      - name: Create output dir
        run: mkdir -p data/track_b

      - name: Fetch real decision log export
        env:
          MONEYBOT_BASE_URL: ${{ secrets.MONEYBOT_BASE_URL }}
          DAILY_OPS_TOKEN: ${{ secrets.DAILY_OPS_TOKEN }}
        run: |
          set -euo pipefail
          mkdir -p data

          # Example protected endpoint (you add this endpoint server-side):
          # GET /api/export-decision-log?limit=50000
          # returns raw JSONL
          curl -fsS --retry 3 --retry-delay 3 --retry-all-errors \
            "$MONEYBOT_BASE_URL/api/export-decision-log?limit=50000" \
            -H "X-Daily-Ops-Token: $DAILY_OPS_TOKEN" \
            -o data/decision_events.jsonl

          test -s data/decision_events.jsonl || (echo "Exported decision log is empty"; exit 1)
          wc -l data/decision_events.jsonl
          tail -n 2 data/decision_events.jsonl

      - name: Run Track B offline pipeline
        run: |
          python3 scripts/run_track_b_offline.py \
            --input-log data/decision_events.jsonl \
            --output-dir data/track_b \
            --min-rows 25

      - name: Upload Track B artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: track-b-offline-output
          path: |
            data/track_b/**
            data/decision_events.jsonl
          if-no-files-found: warn
