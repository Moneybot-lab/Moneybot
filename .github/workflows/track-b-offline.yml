name: Track B Offline Challenger

on:
  schedule:
    - cron: "15 6 * * *"
  workflow_dispatch: {}

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  run-track-b:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Dry run
        run: python3 scripts/run_track_b_offline.py --dry-run

      # Ensure output dir exists so artifact step has something even on early failure
      - name: Create output dir
        run: mkdir -p data/track_b

      # If no real traffic log exists in runner, seed for smoke validation
      - name: Ensure decision log exists
        run: |
          if [ ! -f data/decision_events.jsonl ]; then
            echo "No decision log found; seeding synthetic log for workflow validation."
            python3 scripts/seed_decision_log.py --output data/decision_events.jsonl --rows 260 --overwrite
          fi
          wc -l data/decision_events.jsonl

      - name: Run Track B offline pipeline
        run: |
          python3 scripts/run_track_b_offline.py \
            --input-log data/decision_events.jsonl \
            --output-dir data/track_b \
            --min-rows 25

      - name: Upload Track B artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: track-b-offline-output
          path: |
            data/track_b/**
            data/decision_events.jsonl
          if-no-files-found: warn
