name: Track B Offline Challenger

on:
  schedule:
    # Runs daily at 06:15 UTC (adjust as needed)
    - cron: "15 6 * * *"
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  run-track-b:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # Optional: sanity check commands before execution
      - name: Track B dry-run
        run: |
          python3 scripts/run_track_b_offline.py --dry-run

      # IMPORTANT:
      # This expects data/decision_events.jsonl to exist in the runner workspace.
      # If you fetch/export logs from elsewhere, add that step before this.
      - name: Run Track B offline pipeline
        run: |
          python3 scripts/run_track_b_offline.py \
            --input-log data/decision_events.jsonl \
            --output-dir data/track_b \
            --min-rows 200

      - name: Upload Track B artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: track-b-offline-output
          path: |
            data/track_b/**
          if-no-files-found: warn
